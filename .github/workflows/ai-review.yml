name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Get PR diff (truncate to first 100 lines to reduce cost)
      - name: Get PR diff
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            ${{ github.event.pull_request.url }} \
            -o diff.txt

          # truncate to first 100 lines
          head -n 100 diff.txt > truncated_diff.txt

      # 3️⃣ Call Claude API
      - name: Call Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          PROMPT="You are a senior software engineer. Review this pull request diff and suggest improvements for security, performance, and best practices:\n\n$(cat truncated_diff.txt | sed 's/"/\\"/g')"

          # Prepare JSON payload safely
          PAYLOAD=$(jq -n --arg model "claude-haiku-4-5-20251001" \
                            --arg prompt "$PROMPT" \
                            '{
                              model: $model,
                              max_tokens: 800,
                              messages: [
                                {
                                  role: "user",
                                  content: $prompt
                                }
                              ]
                            }')

          # Call Claude API
          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # Save the review
          echo "$RESPONSE" | jq -r '.content[0].text' > review.txt

      # 4️⃣ Comment result on PR
      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = "Claude returned no response.";
            if (fs.existsSync('review.txt')) {
              review = fs.readFileSync('review.txt','utf8');
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 **Claude AI Code Review:**\n\n" + review
            });
