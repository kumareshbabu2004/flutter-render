name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Get PR diff using GitHub API
      - name: Get PR diff from GitHub API
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            ${{ github.event.pull_request.url }} \
            -o diff.txt

          echo "===== DIFF CONTENT ====="
          cat diff.txt

      # 3️⃣ Install jq for JSON parsing
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 4️⃣ Call Claude API or simulate response
      - name: Call Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          USE_CLAUDE_API: ${{ secrets.USE_CLAUDE_API }} # 'true' = real API, 'false' = test mode
        run: |
          if [ "$USE_CLAUDE_API" = "true" ]; then
            echo "Calling real Claude API..."
            RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
              -H "x-api-key: $CLAUDE_API_KEY" \
              -H "anthropic-version: 2023-06-01" \
              -H "Content-Type: application/json" \
              -d @- <<EOF
{
  "model": "claude-3-haiku-20240307",
  "max_tokens": 500,
  "messages": [
    {
      "role": "user",
      "content": "You are a senior software engineer. Review this pull request diff and suggest improvements for security, performance, and best practices:\n\n$(sed 's/"/\\"/g' diff.txt)"
    }
  ]
}
EOF
            )
          else
            echo "Simulating Claude API response (TEST MODE)..."
            RESPONSE='{
              "content":[{"text":"Security: sanitize inputs.\nPerformance: use caching.\nBest practices: follow coding style."}]
            }'
          fi

          echo "===== RAW CLAUDE RESPONSE ====="
          echo "$RESPONSE"

          # Extract text content from JSON
          echo "$RESPONSE" | jq -r '.content[0].text' > review.txt

          echo "===== CLEAN REVIEW ====="
          cat review.txt

      # 5️⃣ Post comment to PR
      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 **Claude AI Code Review Result:**\n\n" + review
            });
