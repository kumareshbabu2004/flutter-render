name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize]
    branches-ignore:
      - main
      - master

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Get PR diff (limit lines to save tokens)
      - name: Get PR diff
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            ${{ github.event.pull_request.url }} \
            -o diff.txt

          # Keep only first 100 lines to reduce API cost
          head -n 100 diff.txt > truncated_diff.txt
          echo "===== TRUNCATED DIFF ====="
          cat truncated_diff.txt

      # 3️⃣ Call Claude API (safe, low-cost)
      - name: Call Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          # Prepare prompt
          PROMPT="You are a senior software engineer. Review this pull request diff and suggest improvements for security, performance, and best practices:\n\n$(cat truncated_diff.txt | sed 's/"/\\"/g')"

          # Build payload safely
          PAYLOAD=$(jq -n --arg model "claude-haiku-4-5-20251001" \
                            --arg prompt "$PROMPT" \
                            '{
                              model: $model,
                              max_tokens: 300,
                              messages: [
                                { role: "user", content: $prompt }
                              ]
                            }')

          # Call Claude API
          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          # Debug full response (safe, does not echo API key)
          echo "===== CLAUDE RESPONSE ====="
          echo "$RESPONSE" | jq .

          # Extract text safely
          REVIEW=$(echo "$RESPONSE" | jq -r '.content[] | select(.type=="text") | .text' || echo "Claude returned no review")
          echo "$REVIEW" > review.txt

      # 4️⃣ Comment result on PR
      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = "Claude returned no response.";
            if (fs.existsSync('review.txt')) {
              review = fs.readFileSync('review.txt','utf8');
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 **Claude AI Code Review Result:**\n\n" + review
            });
