name: Basic AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      #  FIXED: Get PR diff using GitHub API (No merge-base issue)
      - name: Get PR diff from GitHub API
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            ${{ github.event.pull_request.url }} \
            -o diff.txt

          echo "===== DIFF CONTENT ====="
          cat diff.txt

      - name: Call AI API
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "model": "gpt-4o-mini",
            "messages": [
              {"role": "system", "content": "You are a senior code reviewer."},
              {"role": "user", "content": "Review this pull request diff and suggest improvements:\n$(cat diff.txt)"}
            ]
          }
          EOF
          )

          echo "===== RAW API RESPONSE ====="
          echo "$RESPONSE"

          echo "$RESPONSE" | jq -r '.choices[0].message.content' > review.txt

          echo "===== CLEAN REVIEW ====="
          cat review.txt

      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: " AI Code Review Result:\n\n" + review
            });
