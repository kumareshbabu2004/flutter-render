name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Get PR diff
      - name: Get PR diff
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            ${{ github.event.pull_request.url }} \
            -o diff.txt
          echo "===== DIFF CONTENT ====="
          cat diff.txt

      # 3️⃣ Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 4️⃣ Call Claude API
      - name: Call Claude AI
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
{
  "model": "claude-instant-1",
  "max_tokens": 500,
  "messages": [
    {
      "role": "user",
      "content": "You are a senior software engineer. Review this pull request diff and suggest improvements for security, performance, and best practices:\n\n$(sed 's/"/\\"/g' diff.txt)"
    }
  ]
}
EOF
          )
          echo "===== RAW CLAUDE RESPONSE ====="
          echo "$RESPONSE"

          # extract review text
          echo "$RESPONSE" | jq -r '.content[0].text' > review.txt
          echo "===== CLEAN REVIEW ====="
          cat review.txt

      # 5️⃣ Post comment to PR
      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 **Claude AI Code Review Result:**\n\n" + review
            });
