name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 3️⃣ Get PR diff
      - name: Get PR diff
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            ${{ github.event.pull_request.url }} \
            -o diff.txt

          echo "===== DIFF ====="
          cat diff.txt

      # 4️⃣ Send diff to Claude API
      - name: Call Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          DIFF=$(head -c 12000 diff.txt)

          REQUEST=$(jq -n \
            --arg diff "$DIFF" \
            '{
              model: "claude-3-5-haiku-latest",
              max_tokens: 1000,
              messages: [
                {
                  role: "user",
                  content: "You are a senior software engineer. Review this pull request diff and give suggestions for security, performance, and best practices:\n\n\($diff)"
                }
              ]
            }')

          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "$REQUEST")

          echo "===== CLAUDE RESPONSE ====="
          echo "$RESPONSE"

          # Extract text safely
          REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.content[0].text // "Error: Could not extract review text."')
          echo "$REVIEW_TEXT" > review.txt

      # 5️⃣ Comment result on PR
      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let review = "Claude returned no response.";

            if (fs.existsSync('review.txt')) {
              review = fs.readFileSync('review.txt','utf8');
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 **Claude AI Code Review Result:**\n\n" + review
            });
