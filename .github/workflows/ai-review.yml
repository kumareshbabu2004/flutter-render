name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # Get PR diff
      - name: Get PR diff
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            ${{ github.event.pull_request.url }} \
            -o diff.txt

          echo "===== DIFF ====="
          head -n 50 diff.txt

      # Call Claude API
      - name: Call Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |

          # limit size to reduce cost
          DIFF=$(head -c 12000 diff.txt)

          PROMPT="You are a senior software engineer. Review this pull request diff and suggest improvements for security, performance, and best practices:\n\n$DIFF"

          # Create JSON safely
          jq -n \
            --arg prompt "$PROMPT" \
            '{
              model: "claude-haiku-4-5-20251001",
              max_tokens: 800,
              messages: [
                {
                  role: "user",
                  content: $prompt
                }
              ]
            }' > payload.json

          echo "===== REQUEST PAYLOAD ====="
          cat payload.json

          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          echo "===== CLAUDE RESPONSE ====="
          echo "$RESPONSE"

          echo "$RESPONSE" | jq -r '.content[0].text' > review.txt

          echo "===== CLEAN REVIEW ====="
          cat review.txt

      # Comment PR
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 **Claude AI Code Review:**\n\n" + review
            });
