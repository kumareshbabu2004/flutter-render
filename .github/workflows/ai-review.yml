name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 3️⃣ Get PR diff
      - name: Get PR diff from GitHub API
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            ${{ github.event.pull_request.url }} \
            -o diff.txt

          echo "===== DIFF CONTENT ====="
          cat diff.txt

      # 4️⃣ Call Claude API
      - name: Call Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          DIFF=$(cat diff.txt | head -c 12000)

          SAFE_DIFF=$(jq -Rs . <<< "$DIFF")

          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2023-06-01" \
            -H "Content-Type: application/json" \
            -d "{
              \"model\": \"claude-3-haiku-20240307\",
              \"max_tokens\": 800,
              \"messages\": [
                {
                  \"role\": \"user\",
                  \"content\": \"You are a senior software engineer. Review this pull request diff and give suggestions for security, performance, and best practices:\n\n$DIFF\"
                }
              ]
            }")

          echo "===== RAW CLAUDE RESPONSE ====="
          echo "$RESPONSE"

          echo "$RESPONSE" | jq -r '.content[0].text' > review.txt

          echo "===== CLEAN REVIEW ====="
          cat review.txt

      # 5️⃣ Post Comment to Pull Request
      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let review = "Claude did not return a response.";

            if (fs.existsSync('review.txt')) {
              review = fs.readFileSync('review.txt', 'utf8');
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 **Claude AI Code Review Result:**\n\n" + review
            });
