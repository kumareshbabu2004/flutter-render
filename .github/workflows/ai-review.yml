name: Basic AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ FIXED: Get PR diff using GitHub API (No merge-base issue)
      - name: Get PR diff from GitHub API
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            ${{ github.event.pull_request.url }} \
            -o diff.txt

          echo "===== DIFF CONTENT ====="
          cat diff.txt

      - name: Generate Mock AI Review (Free Testing)
        run: |
          echo "===== MOCK AI REVIEW ====="
          echo "This is a simulated AI review for testing purposes." > review.txt
          echo "" >> review.txt
          echo "Suggestions:" >> review.txt
          echo "- Follow proper naming conventions." >> review.txt
          echo "- Remove unnecessary blank lines." >> review.txt
          echo "- Ensure environment variables are documented." >> review.txt

          cat review.txt

      - name: Post Comment to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review.txt', 'utf8');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 AI Code Review Result:\n\n" + review
            });
