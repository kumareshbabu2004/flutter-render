name: Claude AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Get PR diff
      - name: Get PR diff
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            ${{ github.event.pull_request.url }} \
            -o diff.txt

          # Limit to first 100 lines to reduce cost
          head -n 100 diff.txt > truncated_diff.txt

      # Call Claude API
      - name: Call Claude API
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          PROMPT="You are a senior software engineer. Review this pull request diff and suggest improvements for security, performance, and best practices:\n\n$(cat truncated_diff.txt)"

          # Create JSON safely with jq
          jq -n --arg prompt "$PROMPT" '{
            model: "claude-haiku-4-5-20251001",
            max_tokens: 800,
            messages: [{ role: "user", content: $prompt }]
          }' > payload.json

          # Call API with error handling
          RESPONSE=$(curl -s -w "\n%{http_code}" https://api.anthropic.com/v1/messages \
            -H "x-api-key: $CLAUDE_API_KEY" \
            -H "anthropic-version: 2024-06-01" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)

          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ API request failed with status $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

          echo "$BODY" | jq -r '.content[0].text' > review.txt

      # Comment result on PR
      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let review = "No review returned.";
            if (fs.existsSync('review.txt')) {
              review = fs.readFileSync('review.txt', 'utf8');
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "🤖 **Claude AI Code Review Result:**\n\n" + review
            });
