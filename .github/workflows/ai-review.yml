name: Basic AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get PR diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          echo "===== DIFF CONTENT ====="
          cat diff.txt

      - name: Call AI API
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "model": "gpt-4o-mini",
            "messages": [
              {"role": "system", "content": "You are a senior code reviewer."},
              {"role": "user", "content": "Review this pull request diff and suggest improvements:\n$(cat diff.txt)"}
            ]
          }
          EOF
          )

          echo "===== RAW API RESPONSE ====="
          echo "$RESPONSE"

          echo "$RESPONSE" | jq -r '.choices[0].message.content' > review.txt

          echo "===== CLEAN REVIEW ====="
          cat review.txt

      - name: Get PR diff from GitHub API
        run: |
          curl -L \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
             ${{ github.event.pull_request.url }} \
             -o diff.txt

          echo "===== DIFF CONTENT ====="
          cat diff.txt
