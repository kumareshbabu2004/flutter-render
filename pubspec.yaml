name: bmb_mobile
description: 'Back My Bracket - Tournament Bracket App'
publish_to: 'none'
version: 2.1.0+2

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: 2.5.3
  provider: 6.1.5+1
  http: 1.5.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  speech_to_text: ^7.3.0
  flutter_secure_storage: ^9.2.4
  web: ^1.1.1
  audioplayers: ^6.1.0
  hive: 2.2.3
  hive_flutter: 1.1.0
  firebase_core: 3.6.0
  firebase_auth: 5.3.1
  cloud_firestore: 5.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/garment_backs/
    - assets/companions/
  fonts:
    - family: ClashDisplay
      fonts:
        - asset: fonts/ClashDisplay-Variable.ttf
